<!DOCTYPE html>
<html>
<head>
    <title>The Website Knows You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 1.5s ease;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 30px;
            background: rgba(0,0,0,0.95);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 30px crimson;
            margin-top: 50px;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 28px;
            color: crimson;
            text-shadow: 0 0 15px red;
            margin-bottom: 25px;
            animation: glitch 1.5s infinite alternate;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            font-size: 15px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #050505;
            color: lime;
            outline: none;
        }

        input:focus { border-color: crimson; box-shadow: 0 0 10px crimson; }

        button {
            width: 95%;
            padding: 15px;
            margin-top: 20px;
            background: crimson;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover { background: white; color: crimson; transform: scale(1.02); }

        /* THE MYSTERIOUS ROAMING SCANNER */
        #scanner-orb {
            display: none;
            position: fixed;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(0,255,0,0.2) 50%, transparent 100%);
            box-shadow: 0 0 40px red, inset 0 0 20px lime;
            z-index: 100;
            pointer-events: none;
            filter: blur(2px);
        }

        @keyframes roam {
            0% { top: 10%; left: 10%; transform: scale(1); }
            25% { top: 70%; left: 80%; transform: scale(1.5); }
            50% { top: 40%; left: 50%; transform: scale(0.8); }
            75% { top: 80%; left: 20%; transform: scale(1.2); }
            100% { top: 20%; left: 70%; transform: scale(1); }
        }

        #loading-msg {
            color: orange;
            font-style: italic;
            margin-top: 15px;
            height: 20px;
        }

        /* OUTPUT STYLING */
        #result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: 900; /* Extra Bold */
            color: lime;
            line-height: 1.7;
            text-align: left;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .word-box {
            display: inline-block; /* Prevents word splitting */
            white-space: nowrap;
        }

        footer { padding: 20px; text-align: center; font-size: 12px; opacity: 0.6; }
        footer a { color: crimson; text-decoration: none; margin: 0 10px; }

        @keyframes glitch {
            0% { transform: skew(1deg); }
            100% { transform: skew(-1deg); text-shadow: -2px 0 lime; }
        }
    </style>
</head>
<body>

    <div id="scanner-orb"></div>

    <div class="container">
        <h1>THE SYSTEM KNOWS...</h1>

        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="color" placeholder="Favorite Color">
        <input type="text" id="food" placeholder="Favorite Food">
        <input type="text" id="music" placeholder="Favorite Music Genre">
        <input type="text" id="goal" placeholder="Main Life Goal">

        <button onclick="revealTruth()">REVEAL THE TRUTH</button>

        <div id="loading-msg"></div>
        <div id="result"></div>
    </div>

    <footer>
        <a href="https://wa.me/923149664324">WhatsApp</a> |
        <a href="https://www.instagram.com/ansriaz94">Instagram</a>
    </footer>

    <audio id="type-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="scan-sound" src="https://www.soundjay.com/misc/sounds/wind-chime-1.mp3"></audio>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function typeText(text, element) {
            element.innerHTML = "";
            const audio = document.getElementById("type-sound");
            const words = text.split(" ");

            for (let word of words) {
                const span = document.createElement("span");
                span.className = "word-box";
                
                for (let char of word) {
                    const cSpan = document.createElement("span");
                    cSpan.innerText = char;
                    span.appendChild(cSpan);
                }
                
                element.appendChild(span);
                // Add a space after the word
                element.appendChild(document.createTextNode(" "));
                
                audio.currentTime = 0;
                audio.play().catch(()=>{});
                await sleep(120); 
            }
        }

        async function revealTruth() {
            const data = {
                name: document.getElementById("name").value.trim(),
                color: document.getElementById("color").value.trim(),
                food: document.getElementById("food").value.trim(),
                music: document.getElementById("music").value.trim(),
                goal: document.getElementById("goal").value.trim()
            };

            if (Object.values(data).some(v => v === "")) {
                alert("The system requires all data points.");
                return;
            }

            // UI Reset
            document.getElementById("result").innerHTML = "";
            const orb = document.getElementById("scanner-orb");
            const msg = document.getElementById("loading-msg");
            const scanAudio = document.getElementById("scan-sound");

            // Activate Mysterious Scanner
            orb.style.display = "block";
            orb.style.animation = "roam 4s infinite linear";
            msg.innerText = "EXTRACTING PSYCHOLOGICAL FRAGMENTS...";
            scanAudio.play().catch(()=>{});
            document.body.style.background = "#1a0000";

            await sleep(4000); // Wait for mysterious roaming

            // Deactivate Scanner
            orb.style.display = "none";
            msg.innerText = "";
            document.body.style.background = "#000";

            // Psychological Logic
            const psychBase = [
                `${data.name}, your preference for ${data.music} suggests you use rhythm to regulate an otherwise chaotic emotional state.`,
                `The color ${data.color} signals that you seek peace, but your focus on ${data.goal} reveals a restless spirit that cannot stop moving.`,
                `Eating ${data.food} is your subconscious way of grounding yourself when your thoughts drift too far into the future.`,
                `Psychologically, those who seek '${data.goal}' often have a hidden fear of being forgotten by the world.`,
                `You present a wall to the world, but your internal dialogue is a storm of possibilities.`
            ];

            const shuffled = psychBase.sort(() => 0.5 - Math.random());
            const finalMessage = shuffled.slice(0, 3).join(" ") + " You are closer to your true self than you think.";

            await typeText(finalMessage, document.getElementById("result"));
        }
    </script>
</body>
</html>
