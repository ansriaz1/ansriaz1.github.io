<!DOCTYPE html>
<html>
<head>
    <title>The Website Knows You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 1s ease;
            overflow-x: hidden;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 30px;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 25px crimson;
            margin-top: 50px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 32px;
            color: crimson;
            text-shadow: 0 0 10px red;
            margin-bottom: 20px;
            animation: glitch 1s infinite alternate;
        }

        input, button {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            outline: none;
            transition: all 0.3s;
        }

        input { background: #111; color: white; border: 1px solid #333; }
        input:focus { box-shadow: 0 0 10px lime; border-color: lime; color: lime; }

        button {
            background-color: crimson;
            color: white;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background-color: #ff0000;
            box-shadow: 0 0 20px crimson;
            transform: scale(1.05);
        }

        /* Circular Pulse Loader */
        #loader-container {
            display: none;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .pulse-circle {
            width: 60px;
            height: 60px;
            border: 4px solid crimson;
            border-top: 4px solid lime;
            border-radius: 50%;
            animation: spin 1s linear infinite, pulse-glow 1.5s ease-in-out infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px crimson; } 50% { box-shadow: 0 0 25px lime; } }

        #loading-text {
            font-size: 14px;
            color: orange;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Result Text Styling */
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 800; /* Bold letters */
            color: lime;
            line-height: 1.6;
            text-align: left;
            min-height: 100px;
            /* Prevents words from breaking in half */
            word-spacing: 2px;
        }

        /* Helper class for word wrapping */
        .word-wrapper {
            display: inline-block;
            white-space: nowrap;
        }

        footer {
            margin-top: auto;
            padding: 15px;
            background: rgba(0,0,0,0.9);
            text-align: center;
            font-size: 14px;
        }

        footer a { color: crimson; text-decoration: none; margin: 0 10px; }

        @keyframes glitch {
            0% { text-shadow: 2px 0 red; }
            50% { text-shadow: -2px 0 lime; }
            100% { text-shadow: 2px 0 red; }
        }

        .letter { display: inline-block; animation: pop 0.1s forwards; }
        @keyframes pop { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Website Knows You 👀</h1>

        <input type="text" id="name" placeholder="Enter your name"><br>
        <input type="text" id="color" placeholder="Favorite color"><br>
        <input type="text" id="food" placeholder="Favorite food"><br>

        <button onclick="predict()">Reveal The Truth</button>

        <div id="loader-container">
            <div class="pulse-circle"></div>
        </div>
        <div id="loading-text"></div>
        
        <div id="result"></div>
    </div>

    <footer>
        <a href="https://wa.me/923149664324" target="_blank">WhatsApp</a> |
        <a href="https://www.instagram.com/ansriaz94" target="_blank">Instagram</a> |
        <a href="mailto:yourmail@gmail.com">Gmail</a>
    </footer>

    <audio id="type-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="scan-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-01.mp3"></audio>

    <script>
        function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

        async function typeText(text, element){
            element.innerHTML = "";
            const audio = document.getElementById("type-sound");
            const words = text.split(" ");
            
            for(let word of words) {
                // Create a span for each word to prevent line-breaking mid-word
                let wordSpan = document.createElement('span');
                wordSpan.className = "word-wrapper";
                
                for(let char of word) {
                    let charSpan = document.createElement('span');
                    charSpan.innerText = char;
                    charSpan.classList.add('letter');
                    wordSpan.appendChild(charSpan);
                }

                element.appendChild(wordSpan);
                
                // Add a space after the word
                let space = document.createElement('span');
                space.innerHTML = "&nbsp;";
                element.appendChild(space);

                audio.currentTime = 0; 
                audio.play().catch(() => {});
                await sleep(100); // Slightly slower for dramatic effect
            }
        }

        async function predict(){
            let name = document.getElementById("name").value.trim();
            let color = document.getElementById("color").value.trim();
            let food = document.getElementById("food").value.trim();

            if(!name || !color || !food) return alert("All fields are required!");

            const openers = [
                `Analysis of ${name} reveals a hidden psychological layer:`,
                `${name}, your data suggests a deep subconscious pattern:`,
                `The truth about ${name} is finally surfacing:`
            ];

            const psychTraits = [
                `You possess a strong inner moral compass that you occasionally ignore to please others.`,
                `While you appear composed, you often replay conversations in your head, wondering if you said too much.`,
                `You are an observer who notices details in people that they don't even notice about themselves.`,
                `You have a secret fear of being ordinary, which drives your unique choices in life.`
            ];

            const insights = [
                `The frequency of ${color} in your mind indicates a soul that craves stability but fears stagnation.`,
                `Your preference for ${food} reveals a high-sensory personality that uses flavor to anchor shifting emotions.`,
                `Your love for ${color} and ${food} suggests you are currently at a crossroads between logic and desire.`
            ];

            const ending = "The universe is watching your next move carefully.";

            let message = `${randomFrom(openers)} ${randomFrom(psychTraits)} ${randomFrom(insights)} ${ending}`;

            // Reset UI
            document.getElementById("result").innerHTML = "";
            document.getElementById("loader-container").style.display = "flex";
            document.getElementById("loading-text").innerText = "REACHING INTO YOUR MIND...";
            
            // Background shift
            document.body.style.background = "#0a0000";

            // Mysterious Delay
            const scanAudio = document.getElementById("scan-sound");
            scanAudio.play().catch(() => {});
            
            await sleep(3000); // 3 seconds of circular pulsing

            document.getElementById("loader-container").style.display = "none";
            document.getElementById("loading-text").innerText = "";
            document.body.style.background = "#000";

            await typeText(message, document.getElementById("result"));
        }

        function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    </script>

</body>
</html>
