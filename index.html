<!DOCTYPE html>
<html>
<head>
    <title>The Website Knows You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 30px;
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 25px crimson;
            margin-top: 50px;
            position: relative;
        }

        h1 {
            font-size: 32px;
            color: crimson;
            text-shadow: 0 0 10px red;
            margin-bottom: 20px;
            animation: glitch 1s infinite alternate;
        }

        input, button {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px lime;
            background-color: #111;
            color: lime;
            transform: scale(1.02);
        }

        input.glitch {
            animation: glitch-input 1s infinite alternate;
        }

        button {
            background-color: crimson;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: darkred;
            box-shadow: 0 0 15px crimson, 0 0 25px red;
            transform: scale(1.05);
            animation: glitch-button 0.8s infinite alternate;
        }

        #loading {
            font-size: 18px;
            color: orange;
            min-height: 40px;
            margin-top: 10px;
        }

        #scan-bar-container {
            width: 100%;
            height: 8px;
            background: #111;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        #scan-bar {
            width: 0%;
            height: 100%;
            background: lime;
            border-radius: 5px;
        }

        @keyframes scan-glitch {
            0%,100% { width: 100%; background: lime; }
            50% { width: 95%; background: #0f0; }
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            color: lime;
            min-height: 60px;
            word-wrap: break-word;
        }

        footer {
            margin-top: auto;
            padding: 15px;
            background: rgba(0,0,0,0.9);
            text-align: center;
            font-size: 16px;
        }

        footer a {
            color: crimson;
            margin: 0 10px;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Glitch animations */
        @keyframes glitch {
            0% { text-shadow: 0 0 5px red, 2px 2px 2px lime; }
            50% { text-shadow: 2px 2px 2px crimson, -2px -2px 2px lime; }
            100% { text-shadow: -2px -2px 2px red, 2px 2px 2px lime; }
        }

        @keyframes glitch-button {
            0% { box-shadow: 0 0 15px crimson, 0 0 25px red; }
            50% { box-shadow: 0 0 25px red, 0 0 35px crimson; }
            100% { box-shadow: 0 0 15px crimson, 0 0 25px red; }
        }

        @keyframes glitch-input {
            0% { box-shadow: 0 0 10px lime; }
            50% { box-shadow: 0 0 15px lime, 0 0 20px yellow; }
            100% { box-shadow: 0 0 10px lime; }
        }

        @keyframes pop {
            0% { transform: scale(0); color: yellow; }
            50% { transform: scale(1.2); color: lime; }
            100% { transform: scale(1); color: lime; }
        }

        .letter { display: inline-block; animation: pop 0.3s forwards; }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Website Knows You 👀</h1>

        <input type="text" id="name" placeholder="Enter your name"><br>
        <input type="text" id="color" placeholder="Favorite color"><br>
        <input type="text" id="food" placeholder="Favorite food"><br>

        <button onclick="predict()">Reveal The Truth</button>

        <div id="loading"></div>
        <div id="scan-bar-container">
            <div id="scan-bar"></div>
        </div>
        <div id="result"></div>
    </div>

    <footer>
        <a href="https://wa.me/923149664324" target="_blank">WhatsApp</a> |
        <a href="https://www.instagram.com/ansriaz94" target="_blank">Instagram</a> |
        <a href="mailto:yourmail@gmail.com">Gmail</a>
    </footer>

    <audio id="type-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="scan-sound" src="https://www.soundjay.com/misc/sounds/laser-01.mp3"></audio>

    <script>
        function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

        async function typeText(text, element){
            element.innerHTML = "";
            const audio = document.getElementById("type-sound");
            for(let i=0;i<text.length;i++){
                let span = document.createElement('span');
                span.innerText = text[i];
                span.classList.add('letter');
                element.appendChild(span);
                audio.currentTime=0; audio.play();
                await sleep(50);
            }
        }

        function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

        async function predict(){
            let name = document.getElementById("name").value.trim();
            let color = document.getElementById("color").value.trim();
            let food = document.getElementById("food").value.trim();

            if(!name||!color||!food){
                document.getElementById("result").innerText="Fill all fields!";
                return;
            }

            const openers = [`${name} is a `, `Deep inside, ${name} seems `, `${name} has a `];
            const traits = [`mysterious soul`, `chaotic mind`, `dreamer`, `hidden genius`, `secret rebel`, `cunning strategist`];
            const color_meanings = [`Color ${color} shows calmness and passion`, `Your love for ${color} hides secrets`, `${color} reveals inner creativity`];
            const food_hints = [`Eating ${food} often signals impulsive decisions`, `${food} indicates hidden desires`, `Your choice of ${food} hints at nocturnal thoughts`];
            const endings = [`Brace yourself for unpredictable events.`, `The world won’t understand you easily.`, `Your aura confuses both friends and foes.`, `Fate has strange plans for you.`];

            // Combine with proper spaces
            let message = randomFrom(openers) + " " + randomFrom(traits) + ". " + randomFrom(color_meanings) + ". " + randomFrom(food_hints) + ". " + randomFrom(endings);

            document.body.style.background = "#" + Math.floor(Math.random()*16777215).toString(16);

            let loadingDiv = document.getElementById("loading");
            let scanContainer = document.getElementById("scan-bar-container");
            let scanBar = document.getElementById("scan-bar");
            const scanAudio = document.getElementById("scan-sound");

            loadingDiv.innerText = "Analyzing your mind";
            for(let i=0;i<3;i++){ loadingDiv.innerText += "."; await sleep(500); }

            scanContainer.style.display = "block";
            scanBar.style.width="0%";
            scanBar.style.animation="scan-glitch 2s linear forwards";
            scanAudio.currentTime=0; scanAudio.play();
            await sleep(2000);
            scanContainer.style.display="none";
            loadingDiv.innerText="";

            let resultDiv = document.getElementById("result");
            await typeText(message,resultDiv);

            document.body.style.background = "#" + Math.floor(Math.random()*16777215).toString(16);
        }

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input=>{
            input.addEventListener('input',()=>{
                input.classList.add('glitch');
                input.style.color="lime";
            });
            input.addEventListener('blur',()=>{
                input.classList.remove('glitch');
                input.style.color="white";
            });
        });
    </script>

</body>
</html>
