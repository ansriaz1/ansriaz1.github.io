<!DOCTYPE html>
<html>
<head>
    <title>The Website Knows You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 30px;
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 25px crimson;
            margin-top: 50px;
            position: relative;
        }

        h1 {
            font-size: 32px;
            color: crimson;
            text-shadow: 0 0 10px red;
            margin-bottom: 20px;
            animation: glitch 1s infinite alternate;
        }

        input, button {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            outline: none;
            transition: all 0.3s;
        }

        input {
            background: #222;
            color: white;
        }

        input:focus {
            box-shadow: 0 0 10px lime;
            background-color: #111;
            color: lime;
            transform: scale(1.02);
        }

        input.glitch {
            animation: glitch-input 1s infinite alternate;
        }

        button {
            background-color: crimson;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: darkred;
            box-shadow: 0 0 15px crimson, 0 0 25px red;
            transform: scale(1.05);
            animation: glitch-button 0.8s infinite alternate;
        }

        #loading {
            font-size: 18px;
            color: orange;
            min-height: 40px;
            margin-top: 10px;
        }

        #scan-bar-container {
            width: 100%;
            height: 8px;
            background: #111;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        #scan-bar {
            width: 0%;
            height: 100%;
            background: lime;
            border-radius: 5px;
        }

        @keyframes scan-glitch {
            0%,100% { width: 100%; background: lime; }
            50% { width: 95%; background: #0f0; }
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            color: lime;
            min-height: 60px;
            line-height: 1.6;
            word-wrap: break-word;
            text-align: left;
        }

        footer {
            margin-top: auto;
            padding: 15px;
            background: rgba(0,0,0,0.9);
            text-align: center;
            font-size: 16px;
        }

        footer a {
            color: crimson;
            margin: 0 10px;
            text-decoration: none;
        }

        /* Glitch animations */
        @keyframes glitch {
            0% { text-shadow: 0 0 5px red, 2px 2px 2px lime; }
            50% { text-shadow: 2px 2px 2px crimson, -2px -2px 2px lime; }
            100% { text-shadow: -2px -2px 2px red, 2px 2px 2px lime; }
        }

        @keyframes pop {
            0% { transform: scale(0); color: yellow; }
            100% { transform: scale(1); color: lime; }
        }

        .letter { display: inline-block; animation: pop 0.2s forwards; }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Website Knows You 👀</h1>

        <input type="text" id="name" placeholder="Enter your name"><br>
        <input type="text" id="color" placeholder="Favorite color"><br>
        <input type="text" id="food" placeholder="Favorite food"><br>

        <button onclick="predict()">Reveal The Truth</button>

        <div id="loading"></div>
        <div id="scan-bar-container">
            <div id="scan-bar"></div>
        </div>
        <div id="result"></div>
    </div>

    <footer>
        <a href="https://wa.me/923149664324" target="_blank">WhatsApp</a> |
        <a href="https://www.instagram.com/ansriaz94" target="_blank">Instagram</a> |
        <a href="mailto:yourmail@gmail.com">Gmail</a>
    </footer>

    <audio id="type-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="scan-sound" src="https://www.soundjay.com/misc/sounds/laser-01.mp3"></audio>

    <script>
        function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

        async function typeText(text, element){
            element.innerHTML = "";
            const audio = document.getElementById("type-sound");
            for(let i=0; i<text.length; i++){
                let span = document.createElement('span');
                if (text[i] === " ") {
                    span.innerHTML = "&nbsp;";
                } else {
                    span.innerText = text[i];
                }
                span.classList.add('letter');
                element.appendChild(span);
                
                if (text[i] !== " " && i % 2 === 0) { // Sound every other char for better flow
                    audio.currentTime = 0; 
                    audio.play().catch(() => {});
                }
                await sleep(30);
            }
        }

        function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

        async function predict(){
            let name = document.getElementById("name").value.trim();
            let color = document.getElementById("color").value.trim();
            let food = document.getElementById("food").value.trim();

            if(!name || !color || !food){
                document.getElementById("result").innerText = "Fill all fields!";
                return;
            }

            // Expanded Psychological Traits
            const openers = [
                `Analysis of ${name} suggests a complex duality:`,
                `${name}, your profile indicates a subconscious tension.`,
                `The digital footprint for ${name} reveals a fascinating pattern:`
            ];

            const traits = [
                `You have a great need for other people to like and admire you, yet you tend to be critical of yourself.`,
                `While you have some personality weaknesses, you are generally able to compensate for them.`,
                `You have a tendency to be introverted and reserved in certain situations, but extroverted and sociable in others.`,
                `You pride yourself as an independent thinker and do not accept others' statements without satisfactory proof.`,
                `Disciplined and self-controlled on the outside, you tend to be worrisome and insecure on the inside.`
            ];

            const associations = [
                `The choice of ${color} suggests you value emotional security but often seek external stimulation to avoid boredom.`,
                `Your affinity for ${color} indicates that you are driven by logic, though your intuition often screams the opposite.`,
                `Preference for ${food} points toward a personality that seeks comfort in routine while secretly craving a major life disruption.`,
                `Regularly eating ${food} is often linked to high-functioning sensory seekers who process stress through physical indulgence.`
            ];

            const deepTruths = [
                `You often feel that your true potential has not been realized by those around you.`,
                `At times you have serious doubts as to whether you have made the right decision or done the right thing.`,
                `Some of your aspirations tend to be rather unrealistic, yet you refuse to let them go.`
            ];

            // Build unique message
            let message = `${randomFrom(openers)} ${randomFrom(traits)} ${randomFrom(associations)} ${randomFrom(deepTruths)}`;

            // UI Interaction
            document.body.style.background = "#1a0000";
            let loadingDiv = document.getElementById("loading");
            let scanContainer = document.getElementById("scan-bar-container");
            let scanBar = document.getElementById("scan-bar");
            const scanAudio = document.getElementById("scan-sound");

            document.getElementById("result").innerText = "";
            loadingDiv.innerText = "Accessing Psychological Database";
            for(let i=0; i<3; i++){ loadingDiv.innerText += "."; await sleep(500); }

            scanContainer.style.display = "block";
            scanBar.style.width = "0%";
            scanBar.style.animation = 'none';
            scanBar.offsetHeight; 
            scanBar.style.animation = "scan-glitch 2s linear forwards";
            
            scanAudio.currentTime = 0; 
            scanAudio.play().catch(() => {});
            
            await sleep(2000);
            scanContainer.style.display = "none";
            loadingDiv.innerText = "";

            await typeText(message, document.getElementById("result"));
            document.body.style.background = "#000";
        }

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input=>{
            input.addEventListener('input',()=>{
                input.classList.add('glitch');
                input.style.color="lime";
            });
            input.addEventListener('blur',()=>{
                input.classList.remove('glitch');
                input.style.color="white";
            });
        });
    </script>
</body>
                                   </html>
