DOCTYPE html>
<html>
<head>
    <title>The Website Knows You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 30px;
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 25px crimson;
            margin-top: 50px;
            position: relative;
        }

        h1 {
            font-size: 32px;
            color: crimson;
            text-shadow: 0 0 10px red;
            margin-bottom: 20px;
            animation: glitch 1s infinite alternate;
        }

        input, button {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px lime;
            background-color: #111;
            color: lime;
            transform: scale(1.02);
        }

        input.glitch {
            animation: glitch-input 1s infinite alternate;
        }

        button {
            background-color: crimson;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: darkred;
            box-shadow: 0 0 15px crimson, 0 0 25px red;
            transform: scale(1.05);
            animation: glitch-button 0.8s infinite alternate;
        }

        #loading {
            font-size: 18px;
            color: orange;
            min-height: 40px;
            margin-top: 10px;
        }
